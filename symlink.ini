# Dotfiles symlink configuration
# Each section defines a symlink mapping:
#   source = path relative to this dotfiles repo
#   target = default target path (used on Linux)
#   target_macos = macOS-specific target path (optional, falls back to target)

[zshrc]
source = shell/zshrc
target = ~/.zshrc

[bashrc]
source = shell/bashrc
target = ~/.bashrc

[tmux]
source = tmux/.tmux.conf
target = ~/.tmux.conf

[ghostty]
source = ghostty
target = ~/.config/ghostty
target_macos = ~/Library/Application Support/com.mitchellh.ghostty

[kitty]
source = kitty
target = ~/.config/kitty

[systemd]
source = systemd
target = ~/.config/systemd

[mpv]
source = mpv
target = ~/.config/mpv

[mpv-bin]
source = mpv/mpv
target = ~/.local/bin/mpv
