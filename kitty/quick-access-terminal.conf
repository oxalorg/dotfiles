# vim:fileencoding=utf-8:foldmethod=marker

# Quick-Access Terminal (Quake-style dropdown)

# Window size
lines 65
columns 80

# Screen edge: top, bottom, left, right, background, center, center-sized, none
edge top

# Transparency
background_opacity 0.85

# Auto-hide when focus is lost
hide_on_focus_loss yes

# Capture OS-level keyboard shortcuts
grab_keyboard no

# Margins in pixels (Wayland/macOS only)
margin_left 0
margin_right 0
margin_top 0
margin_bottom 0

# Start hidden on launch
start_as_hidden no

# Wayland keyboard focus policy
focus_policy exclusive

# Window class / app id
app_id kitty-quick-access

# Set env var for shell detection
kitty_override env KITTY_QUICK_ACCESS=1

# Disable close confirmation to prevent invisible modal dialogs
# from deadlocking the panel's event loop
confirm_os_window_close 0
